; we use this when building the app.
appname = openvpn-ui
httpport = 8080
runmode = prod
EnableGzip = true
EnableAdmin = false
sessionon = true
CopyRequestBody = true
AuthType = "password"
DbPath = "./db/data.db"
EasyRsaPath = "/usr/share/easy-rsa"
OpenVpnPath = "/etc/openvpn"
OpenVpnManagementAddress = "openvpn:2080"
OpenVpnManagementNetwork = "tcp"
OVConfigLogVerbose = "1"

# Google OAuth2 — values are read from environment variables at runtime.
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REDIRECT_URL, ALLOWED_DOMAINS
# Leave these blank; do not bake credentials into the image.
googleClientID =
googleClientSecret =
googleRedirectURL =
allowedDomains =