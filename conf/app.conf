AppName = openvpn-ui
HttpPort = 8080
RunMode = prod
EnableGzip = true
EnableAdmin = true
SessionOn = true
CopyRequestBody = true
DbPath = "./db/data.db"
AuthType = "password"
; LdapAddress = "localhost:389"
; LdapDn = "cn=%s,ou=users,dc=syncloud,dc=org"
; plain/tls/starttls
; LdapTransport = "plain"
; LdapInsecureSkipVerify = true
;EasyRsaPath = "/usr/share/easy-rsa"
EasyRsaPath = "./easy-rsa"
OpenVpnPath = "./openvpn"
OpenVpnManagementAddress = "openvpn:2080"
OpenVpnManagementNetwork = "tcp"

; --- Monitoring (long-term user traffic tracking) ---
; All values can be overridden via environment variables (Docker-friendly).
MonitoringEnabled = ${OPENVPN_UI_MONITORING_ENABLED||true}
MonitoringScrapeIntervalS = ${OPENVPN_UI_MONITORING_SCRAPE_INTERVAL_S||60}
MonitoringSampleRetentionDays = ${OPENVPN_UI_MONITORING_SAMPLE_RETENTION_DAYS||30}
MonitoringHourlyRetentionDays = ${OPENVPN_UI_MONITORING_HOURLY_RETENTION_DAYS||365}
; Shared secret used by the OpenVPN client-disconnect hook to authenticate to
; /api/v1/monitor/disconnect. Set OPENVPN_UI_MONITORING_HOOK_TOKEN in production.
MonitoringHookToken = ${OPENVPN_UI_MONITORING_HOOK_TOKEN||}

; --- InfluxDB v3 (optional long-term time-series backend) ---
InfluxEnabled = ${OPENVPN_UI_INFLUX_ENABLED||false}
InfluxURL = ${OPENVPN_UI_INFLUX_URL||http://influxdb:8181}
InfluxToken = ${OPENVPN_UI_INFLUX_TOKEN||}
InfluxDatabase = ${OPENVPN_UI_INFLUX_DATABASE||openvpn}
InfluxBufferSize = ${OPENVPN_UI_INFLUX_BUFFER_SIZE||1000}
InfluxFlushIntervalS = ${OPENVPN_UI_INFLUX_FLUSH_INTERVAL_S||10}