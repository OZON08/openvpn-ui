services:
    openvpn:
        container_name: openvpn
        image: ozon08/openvpn-server:latest
        privileged: true
        ports:
            - "1194:1194/udp"   # openvpn UDP port
            # - "1194:1194/tcp"   # openvpn TCP port
            # - "2080:2080/tcp"  # management port. uncomment if you would like to share it with the host
        environment:
            TRUST_SUB: "10.0.70.0/24"
            GUEST_SUB: "10.0.71.0/24"
            HOME_SUB: "192.168.88.0/24"
            # v0.9.7 client-disconnect hook — the script is bundled into
            # openvpn-server v0.6.2+ at /opt/app/bin/client-disconnect.sh.
            # Leave OPENVPN_UI_HOOK_TOKEN empty to disable; otherwise it must
            # match OPENVPN_UI_MONITORING_HOOK_TOKEN on the openvpn-ui service.
            # Also uncomment the `client-disconnect` line in server.conf.
            OPENVPN_UI_URL: "http://openvpn-ui:8080"
            OPENVPN_UI_HOOK_TOKEN: "${OPENVPN_UI_MONITORING_HOOK_TOKEN:-}"
        volumes:
            - ./pki:/etc/openvpn/pki
            - ./clients:/etc/openvpn/clients
            - ./config:/etc/openvpn/config
            - ./staticclients:/etc/openvpn/staticclients
            - ./log:/var/log/openvpn
            - ./fw-rules.sh:/opt/app/fw-rules.sh
            - ./checkpsw.sh:/opt/app/checkpsw.sh
            - ./server.conf:/etc/openvpn/server.conf
        cap_add:
            - NET_ADMIN
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "echo '' > /dev/tcp/127.0.0.1/2080 2>/dev/null || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 60s

    openvpn-ui:
        container_name: openvpn-ui
        image: ozon08/openvpn-ui:latest
        environment:
            - OPENVPN_ADMIN_USERNAME=${OPENVPN_ADMIN_USERNAME}
            - OPENVPN_ADMIN_PASSWORD=${OPENVPN_ADMIN_PASSWORD}
            # v0.9.7 monitoring — all optional, defaults in app.conf apply when unset.
            # Set a strong token to enable the client-disconnect webhook; must match
            # OPENVPN_UI_HOOK_TOKEN on the openvpn service above.
            - OPENVPN_UI_MONITORING_HOOK_TOKEN=${OPENVPN_UI_MONITORING_HOOK_TOKEN:-}
            # - OPENVPN_UI_MONITORING_ENABLED=true
            # - OPENVPN_UI_MONITORING_SCRAPE_INTERVAL_S=60
            # - OPENVPN_UI_MONITORING_SAMPLE_RETENTION_DAYS=30
            # - OPENVPN_UI_MONITORING_HOURLY_RETENTION_DAYS=365
            # Optional InfluxDB v3 export for Grafana dashboards:
            # - OPENVPN_UI_INFLUX_ENABLED=true
            # - OPENVPN_UI_INFLUX_URL=http://influxdb3:8181
            # - OPENVPN_UI_INFLUX_TOKEN=${INFLUX_TOKEN}
            # - OPENVPN_UI_INFLUX_DATABASE=openvpn
        ports:
            - "8080:8080/tcp"
        volumes:
            - ./:/etc/openvpn
            - ./db:/opt/openvpn-ui/db
            - ./pki:/usr/share/easy-rsa/pki
            - /var/run/docker.sock:/var/run/docker.sock:ro
        restart: always
        healthcheck:
            test: ["CMD", "wget", "-qO/dev/null", "http://localhost:8080"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 15s
        depends_on:
            openvpn:
                condition: service_healthy