<!DOCTYPE html>
<html>
  <head>
    {{template "common/header.html" .}}
    {{template "head" .}}
  </head>
  <body class="hold-transition sidebar-mini layout-fixed">
    <div class="wrapper">

      <!-- Top navbar (minimal, only right-side controls) -->
      <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fa fa-bars"></i></a>
          </li>
        </ul>
        <ul class="navbar-nav ml-auto">
          {{/* Light/Dark toggle — hidden for now, forced dark via script below.
          <li class="nav-item">
            <div class="custom-control custom-switch" style="padding-top:14px; margin-right:14px;">
              <input type="checkbox" class="custom-control-input" id="checkbox">
              <label class="custom-control-label" for="checkbox" id="theme-label">Dark</label>
            </div>
          </li>
          */}}
          <li class="nav-item dropdown user-menu">
            <a href="#" class="nav-link dropdown-toggle" data-toggle="dropdown">
              <i class="fa fa-user-circle"></i>
              <span class="d-none d-md-inline">{{ .Userinfo.Name }}</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-right">
              <li><a href="{{urlfor "ProfileController.Get"}}" class="dropdown-item"><i class="fa fa-user-cog mr-2"></i>Profile</a></li>
              <div class="dropdown-divider"></div>
              <li><a href="{{urlfor "LoginController.Logout"}}" class="dropdown-item"><i class="fa fa-sign-out mr-2"></i>Sign out</a></li>
            </ul>
          </li>
        </ul>
      </nav>

      {{template "common/sidebar.html" .}}

      <!-- Content Wrapper -->
      <div class="content-wrapper">
        <section class="content pt-3">
          <div class="container-fluid">
            {{template "body" .}}
          </div>
        </section>
      </div>

      {{template "common/footer.html" .}}
    </div>
  </body>
</html>

<script>
  // Theme toggle — persisted in localStorage
  const checkbox = document.getElementById('checkbox');
  const themeLabel = document.getElementById('theme-label');
  const body = document.body;
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme !== 'light') {
    // v0.9.7 is dark by default
    body.classList.add('dark-mode');
    if (checkbox) checkbox.checked = true;
    if (themeLabel) themeLabel.textContent = 'Dark';
  } else {
    if (themeLabel) themeLabel.textContent = 'Light';
  }
  if (checkbox) {
    checkbox.addEventListener('change', function () {
      body.classList.toggle('dark-mode', checkbox.checked);
      if (themeLabel) themeLabel.textContent = checkbox.checked ? 'Dark' : 'Light';
      localStorage.setItem('theme', checkbox.checked ? 'dark' : 'light');
    });
  }
</script>
